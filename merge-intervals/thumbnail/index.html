<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, height=720" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1280px; height: 720px; overflow: hidden;
        background: #0b0e11;
        font-family: "Hanken Grotesk", "Arial Black", sans-serif;
      }

      /* ── BACKGROUND ── */
      .bg {
        position: absolute; inset: 0;
        background: #0b0e11;
      }
      /* diagonal light-streak accent */
      .streak {
        position: absolute;
        width: 900px; height: 3px;
        background: linear-gradient(90deg, transparent, rgba(110,231,168,0.22), transparent);
        top: 318px; left: -80px;
        transform: rotate(-12deg);
        filter: blur(1px);
      }
      .streak-2 {
        position: absolute;
        width: 700px; height: 2px;
        background: linear-gradient(90deg, transparent, rgba(93,210,214,0.18), transparent);
        top: 370px; left: -40px;
        transform: rotate(-12deg);
        filter: blur(1px);
      }
      /* subtle dot grid */
      .grid {
        position: absolute; inset: 0;
        background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      /* vertical separator */
      .sep {
        position: absolute;
        left: 620px; top: 60px; bottom: 60px;
        width: 1px;
        background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08) 30%, rgba(255,255,255,0.08) 70%, transparent);
      }

      /* ── LEFT PANEL ── */
      .left {
        position: absolute;
        left: 64px; top: 0; bottom: 0; width: 520px;
        display: flex; flex-direction: column; justify-content: center;
        gap: 18px;
      }
      .badge {
        display: inline-flex; align-items: center; gap: 10px;
        width: fit-content;
        background: rgba(255,180,84,0.14);
        border: 1.5px solid rgba(255,180,84,0.55);
        border-radius: 8px;
        padding: 7px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #ffb454;
      }
      .badge-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #ffb454;
        box-shadow: 0 0 8px #ffb454;
      }
      .headline-wrap { line-height: 1.0; }
      .h1-line-1 {
        display: block;
        font-size: 7.8rem;
        font-weight: 900;
        letter-spacing: -0.03em;
        color: #eceef0;
        text-shadow: 0 2px 40px rgba(110,231,168,0.25);
      }
      .h1-line-2 {
        display: block;
        font-size: 7.8rem;
        font-weight: 900;
        letter-spacing: -0.03em;
        color: transparent;
        -webkit-text-stroke: 2.5px #6ee7a8;
        text-shadow: 0 0 60px rgba(110,231,168,0.3);
      }
      .tagline {
        font-size: 1.25rem;
        font-weight: 400;
        color: #8b96a6;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .tagline strong {
        color: #eceef0;
        font-weight: 600;
      }
      /* solved badge */
      .solved-badge {
        display: inline-flex; align-items: center; gap: 10px;
        width: fit-content;
        background: rgba(110,231,168,0.12);
        border: 1.5px solid rgba(110,231,168,0.4);
        border-radius: 8px;
        padding: 8px 20px;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6ee7a8;
      }
      .check {
        font-size: 1.1rem;
      }

      /* ── RIGHT PANEL — INTERVAL VISUAL ── */
      .right {
        position: absolute;
        left: 660px; right: 32px; top: 0; bottom: 0;
        display: flex; flex-direction: column;
        justify-content: center;
        gap: 28px;
        padding: 0 24px;
      }

      /* number line track */
      .track-label {
        font-family: "Courier New", monospace;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: #8b96a6;
        margin-bottom: 6px;
      }
      .track {
        position: relative;
        width: 100%;
        height: 88px;
        background: rgba(26,31,36,0.7);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 10px;
        overflow: hidden;
      }
      /* axis */
      .axis {
        position: absolute;
        left: 24px; right: 24px;
        height: 1px; bottom: 20px;
        background: rgba(255,255,255,0.1);
      }

      /* pill: scale maps 0-18 over 540px wide track content (24px left pad, 540-24=516 usable px → 516/18=28.67px/unit) */
      /* left = 24 + value*28.67; width = span*28.67 */
      .bar {
        position: absolute;
        height: 38px;
        top: 14px;
        border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        font-family: "Courier New", monospace;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        border-width: 1.5px;
        border-style: solid;
        white-space: nowrap;
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      }

      /* INPUT bars: [8,10] [1,3] [2,6] [15,18] — shown in UNSORTED (given) order, staggered vertically */
      /* Using 28.67px/unit, offset 24px */
      /* [1,3]: left=52.67 width=57.33  [2,6]: left=81.33 width=114.67  [8,10]: left=253.33 width=57.33  [15,18]: left=454.67 width=86 */
      .bar-amber {
        background: rgba(255,180,84,0.16);
        border-color: #ffb454;
        color: #ffb454;
      }
      .bar-amber-dim {
        background: rgba(255,180,84,0.09);
        border-color: rgba(255,180,84,0.45);
        color: rgba(255,180,84,0.7);
      }
      .bar-muted {
        background: rgba(139,150,166,0.1);
        border-color: rgba(139,150,166,0.35);
        color: rgba(139,150,166,0.7);
      }

      /* OUTPUT bars: [1,6] [8,10] [15,18] */
      .bar-green {
        background: rgba(110,231,168,0.18);
        border-color: #6ee7a8;
        color: #6ee7a8;
        box-shadow: 0 2px 18px rgba(110,231,168,0.2);
      }

      /* merge arrow */
      .arrow-row {
        display: flex; align-items: center; justify-content: center;
        gap: 0;
      }
      .arrow-line {
        width: 60px; height: 2px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2));
      }
      .arrow-head {
        font-size: 1.5rem;
        color: rgba(255,255,255,0.25);
        line-height: 1;
      }
      .arrow-label {
        margin-left: 14px;
        font-family: "Courier New", monospace;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(255,255,255,0.22);
      }

      /* input track — two rows to show overlap clearly */
      .input-track {
        position: relative; width: 100%; height: 100px;
        background: rgba(26,31,36,0.7);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 10px;
        overflow: hidden;
      }
      .input-track .axis {
        bottom: 18px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="thumbnail"
      data-start="0"
      data-duration="1"
      data-width="1280"
      data-height="720"
      style="position:relative; width:1280px; height:720px; overflow:hidden;"
    >
    <div class="bg">
      <div class="grid"></div>
      <div class="streak"></div>
      <div class="streak-2"></div>
    </div>

    <div class="sep"></div>

    <!-- LEFT: TEXT -->
    <div class="left">
      <div class="badge">
        <div class="badge-dot"></div>
        LeetCode &nbsp;·&nbsp; Medium
      </div>

      <div class="headline-wrap">
        <span class="h1-line-1">MERGE</span>
        <span class="h1-line-2">INTERVALS</span>
      </div>

      <div class="tagline">
        <strong>Step-by-step</strong> &nbsp;Python &nbsp;·&nbsp; O(n&nbsp;log&nbsp;n)
      </div>

      <div class="solved-badge">
        <span class="check">✓</span> Fully Explained
      </div>
    </div>

    <!-- RIGHT: VISUAL -->
    <div class="right">

      <div>
        <div class="track-label">Input — overlapping ranges</div>
        <!-- two-row input track to show overlap visually -->
        <div class="input-track">
          <div class="axis"></div>
          <!-- Row 1: [8,10] and [15,18] -->
          <!-- [8,10]: left=24+8*28.67=253.4  width=57.3 -->
          <div class="bar bar-amber" style="left:253px; width:58px; top:8px;">[8,10]</div>
          <!-- [15,18]: left=24+15*28.67=454  width=86 -->
          <div class="bar bar-muted" style="left:454px; width:86px; top:8px;">[15,18]</div>
          <!-- Row 2: [1,3] and [2,6] — show they overlap each other -->
          <!-- [1,3]: left=24+28.67=52.7  width=57.3 -->
          <div class="bar bar-amber-dim" style="left:53px; width:57px; top:52px;">[1,3]</div>
          <!-- [2,6]: left=24+2*28.67=81.3  width=4*28.67=114.7 -->
          <div class="bar bar-amber" style="left:81px; width:115px; top:52px;">[2,6]</div>
        </div>
      </div>

      <!-- arrow -->
      <div class="arrow-row">
        <div class="arrow-line"></div>
        <div class="arrow-head">▼</div>
        <div class="arrow-label">merge overlaps</div>
      </div>

      <div>
        <div class="track-label">Output — clean result</div>
        <div class="track">
          <div class="axis"></div>
          <!-- [1,6]: left=24+28.67=52.7  width=5*28.67=143.3 -->
          <div class="bar bar-green" style="left:53px; width:143px; top:24px;">[1,&thinsp;6]</div>
          <!-- [8,10]: left=253  width=57 -->
          <div class="bar bar-green" style="left:253px; width:58px; top:24px;">[8,10]</div>
          <!-- [15,18]: left=454  width=86 -->
          <div class="bar bar-green" style="left:454px; width:86px; top:24px;">[15,18]</div>
        </div>
      </div>

    </div>
    </div><!-- /#root -->

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // Static frame — everything visible at t=0, no animation needed
      window.__timelines["thumbnail"] = tl;
    </script>
  </body>
</html>
